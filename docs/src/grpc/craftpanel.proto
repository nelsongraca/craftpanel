syntax = "proto3";

package craftpanel.agent.v1;

option java_package = "com.craftpanel.agent.v1";
option java_multiple_files = true;

import "google/protobuf/timestamp.proto";

// ─────────────────────────────────────────────────────────────────────────────
// SERVICES
// ─────────────────────────────────────────────────────────────────────────────

// ControlService — persistent bidirectional stream between master and agent.
// The agent initiates and maintains this connection for the lifetime of the
// agent process, reconnecting automatically on disconnect.
service ControlService {
  // Called once on first startup when the agent has no stored node key.
  // Master creates a PENDING node record and returns a unique node key.
  rpc RegisterNode(RegisterNodeRequest) returns (RegisterNodeResponse);

  // Called on subsequent startups when the agent has a stored node key.
  // Master matches the key and returns the current node status.
  rpc IdentifyNode(IdentifyNodeRequest) returns (IdentifyNodeResponse);

  // The main persistent bidirectional stream. Established immediately after
  // RegisterNode or IdentifyNode succeeds. The first message the agent sends
  // must always be a NodeStateSnapshot for master to reconcile DB state.
  // Stream lives for the duration of the connection.
  rpc Control(stream AgentMessage) returns (stream MasterMessage);
}

// DataService — on-demand connections for large or interactive data streams.
// A new connection is established per operation and torn down on completion.
service DataService {
  // Bidirectional console stream. Agent proxies browser input to the container
  // via Docker attach stdin and streams container stdout/stderr back.
  rpc Console(stream ConsoleInput) returns (stream ConsoleOutput);

  // File operations — unary RPCs for metadata and small content.
  rpc ListFiles(ListFilesRequest)       returns (ListFilesResponse);
  rpc ReadFile(ReadFileRequest)         returns (ReadFileResponse);
  rpc WriteFile(WriteFileRequest)       returns (WriteFileResponse);
  rpc DeleteFile(DeleteFileRequest)     returns (DeleteFileResponse);
  rpc MakeDirectory(MakeDirectoryRequest) returns (MakeDirectoryResponse);
  rpc MoveFile(MoveFileRequest)         returns (MoveFileResponse);
  rpc CopyFile(CopyFileRequest)         returns (CopyFileResponse);

  // Streaming file transfer.
  rpc UploadFile(stream UploadFileChunk) returns (UploadFileResponse);
  rpc DownloadFile(DownloadFileRequest)  returns (stream DownloadFileChunk);
}

// ─────────────────────────────────────────────────────────────────────────────
// REGISTRATION & IDENTIFICATION
// ─────────────────────────────────────────────────────────────────────────────

message RegisterNodeRequest {
  // Bootstrap token from agent config — shared secret set in master config.
  string bootstrap_token = 1;
  NodeMetadata metadata  = 2;
}

message RegisterNodeResponse {
  // Unique 256-bit node key generated by master. Agent persists this to disk.
  string node_key = 1;
  // UUID assigned to this node record by master.
  string node_id  = 2;
}

message IdentifyNodeRequest {
  // Previously issued node key read from the agent's local key file.
  string node_key    = 1;
  // Updated metadata reported on every connect in case hardware has changed.
  NodeMetadata metadata = 2;
}

message IdentifyNodeResponse {
  IdentifyStatus status = 1;
  string node_id        = 2;

  enum IdentifyStatus {
    IDENTIFY_STATUS_UNSPECIFIED = 0;
    // Node is trusted and active — master will dispatch commands.
    ACTIVE   = 1;
    // Node exists but has not been trusted by an admin yet.
    PENDING  = 2;
    // Node key is unknown or has been revoked — agent should halt.
    REJECTED = 3;
  }
}

message NodeMetadata {
  string hostname         = 1;
  string public_ip        = 2;
  string private_ip       = 3;
  int32  total_ram_mb     = 4;
  int32  total_cpu_shares = 5;
  // Agent version string — for compatibility checks.
  string agent_version    = 6;
}

// ─────────────────────────────────────────────────────────────────────────────
// CONTROL STREAM ENVELOPES
// ─────────────────────────────────────────────────────────────────────────────

// Wrapper for all messages sent from master to agent on the control stream.
message MasterMessage {
  // Correlation ID — set by master on commands that expect a follow-up update
  // so the agent can reference it (e.g. migration ID on rsync commands).
  string correlation_id = 1;

  oneof payload {
    // Container lifecycle
    CreateContainerCommand  create_container  = 2;
    StartContainerCommand   start_container   = 3;
    StopContainerCommand    stop_container    = 4;
    RestartContainerCommand restart_container = 5;
    RemoveContainerCommand  remove_container  = 6;

    // Backups
    TriggerBackupCommand trigger_backup = 7;
    DeleteBackupCommand  delete_backup  = 8;

    // Migration
    PrepareRsyncReceiveCommand prepare_rsync_receive = 9;
    StartRsyncCommand          start_rsync           = 10;

    // Node lifecycle
    ShutdownCommand shutdown = 11;
  }
}

// Wrapper for all messages sent from agent to master on the control stream.
message AgentMessage {
  string node_id = 1;

  oneof payload {
    // Sent as the first message after IdentifyNode or RegisterNode succeeds.
    // Master reconciles DB state against this snapshot before issuing commands.
    NodeStateSnapshot node_state = 2;

    // Observability — ongoing
    NodeMetricsUpdate      node_metrics      = 3;
    ContainerMetricsUpdate container_metrics = 4;
    ServerStatusUpdate     server_status     = 5;
    PlayerUpdate           player_update     = 6;

    // Migration
    RsyncReadyUpdate    rsync_ready    = 7;
    RsyncProgressUpdate rsync_progress = 8;
    RsyncCompleteUpdate rsync_complete = 9;

    // Backups
    BackupProgressUpdate backup_progress = 10;
    BackupCompleteUpdate backup_complete = 11;

    // Node lifecycle
    ShutdownAcknowledgeUpdate shutdown_acknowledge = 12;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// NODE STATE SNAPSHOT
// ─────────────────────────────────────────────────────────────────────────────

// Sent proactively as the first AgentMessage after every (re)connect.
// Master reconciles DB server statuses against this before issuing any commands.
// Covers all containers the agent finds on the node — running, stopped, or exited.
message NodeStateSnapshot {
  repeated ContainerState containers = 1;
  google.protobuf.Timestamp recorded_at = 2;
}

message ContainerState {
  string server_id      = 1;
  string container_id   = 2;
  string container_name = 3;
  RunState run_state    = 4;

  enum RunState {
    RUN_STATE_UNSPECIFIED = 0;
    // Container is running normally.
    RUNNING = 1;
    // Container was stopped cleanly via CraftPanel.
    STOPPED = 2;
    // Container exited unexpectedly — Docker restart policy did not bring it
    // back (e.g. restart limit hit, or manually stopped outside CraftPanel).
    // Surfaced distinctly in the UI so admins know it was not a clean shutdown.
    EXITED  = 3;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// MASTER → AGENT COMMANDS
// ─────────────────────────────────────────────────────────────────────────────

message CreateContainerCommand {
  string server_id      = 1;
  string container_name = 2;
  // Full image reference, e.g. "itzg/minecraft-server:latest".
  string image          = 3;
  int32  ram_mb         = 4;
  int32  cpu_shares     = 5;
  // Host port mapped to container port 25565. 0 = no host port mapping.
  int32  host_port      = 6;
  // Full env var set — system-managed vars (EULA, TYPE, VERSION) merged with
  // server_env_vars by master before issuing this command.
  map<string, string> env_vars = 7;
  repeated VolumeMount mounts  = 8;
  // Docker bridge network name for same-node container communication.
  string docker_network = 9;
  // Always "unless-stopped" — containers must survive agent restarts and
  // node reboots without waiting for the agent to intervene.
  // Included explicitly so the intent is clear at the protocol level.
  string restart_policy = 10;
  // Stop command written to container stdin on graceful stop/restart.
  // Derived from server_type default unless overridden in UI.
  // e.g. "stop" for game servers, "end" for some proxies. Empty = skip.
  string stop_command   = 11;
}

message VolumeMount {
  string host_path      = 1;
  string container_path = 2;
  bool   read_only      = 3;
}

message StartContainerCommand {
  string server_id      = 1;
  string container_name = 2;
}

message StopContainerCommand {
  string server_id      = 1;
  string container_name = 2;
  // Seconds to wait for graceful exit via stdin before Docker stop (SIGTERM → SIGKILL).
  int32  timeout_seconds = 3;
  // Command written to container stdin to initiate graceful shutdown.
  // Empty = skip stdin command and proceed directly to Docker stop.
  string stop_command    = 4;
}

message RestartContainerCommand {
  string server_id       = 1;
  string container_name  = 2;
  int32  timeout_seconds = 3;
  // Same stdin stop command used during the stop phase of the restart.
  string stop_command    = 4;
}

message RemoveContainerCommand {
  string server_id      = 1;
  string container_name = 2;
  // Force-remove even if the container is still running.
  bool   force          = 3;
}

message TriggerBackupCommand {
  string backup_id        = 1;
  string server_id        = 2;
  string container_name   = 3;
  // Absolute destination path on this node for the resulting archive.
  string destination_path = 4;
}

message DeleteBackupCommand {
  string backup_id  = 1;
  string file_path  = 2;
}

message PrepareRsyncReceiveCommand {
  string migration_id     = 1;
  string server_id        = 2;
  // Absolute path on this node where data should be received into.
  string destination_path = 3;
  // Port pre-allocated by master from the destination node's port range.
  // Agent binds the rsyncd container to this port.
  int32  port             = 4;
  // craftpanel-rsync image reference. Pinned by master to ensure consistency.
  string rsync_image      = 5;
}

message StartRsyncCommand {
  string migration_id      = 1;
  string server_id         = 2;
  // Absolute path on this node to sync from.
  string source_path       = 3;
  // Private IP of the destination node.
  string destination_ip    = 4;
  int32  destination_port  = 5;
  // One-time password returned by the destination agent in RsyncReadyUpdate.
  string rsync_password    = 6;
  // craftpanel-rsync image reference.
  string rsync_image       = 7;
  // False = initial pass (server still running).
  // True  = final delta pass (server stopped, minimise downtime window).
  bool   is_final_pass     = 8;
}

message ShutdownCommand {
  // Seconds to wait per container for graceful stdin stop before Docker stop.
  int32 timeout_seconds = 1;
}

// ─────────────────────────────────────────────────────────────────────────────
// AGENT → MASTER OBSERVABILITY
// ─────────────────────────────────────────────────────────────────────────────

message NodeMetricsUpdate {
  google.protobuf.Timestamp recorded_at  = 1;
  double cpu_percent                     = 2;
  repeated double cpu_per_core           = 3;
  int32  ram_used_mb                     = 4;
  int32  ram_total_mb                    = 5;
  int64  net_in_bytes                    = 6;
  int64  net_out_bytes                   = 7;
  int64  disk_used_bytes                 = 8;
  int64  disk_total_bytes                = 9;
}

message ContainerMetricsUpdate {
  string server_id                       = 1;
  google.protobuf.Timestamp recorded_at  = 2;
  double cpu_percent                     = 3;
  int32  ram_used_mb                     = 4;
  int64  net_in_bytes                    = 5;
  int64  net_out_bytes                   = 6;
}

message ServerStatusUpdate {
  string server_id                       = 1;
  ServerStatus status                    = 2;
  // Present when status is not STOPPED.
  string container_id                    = 3;
  google.protobuf.Timestamp recorded_at  = 4;

  enum ServerStatus {
    SERVER_STATUS_UNSPECIFIED = 0;
    STOPPED   = 1;
    STARTING  = 2;
    HEALTHY   = 3;
    UNHEALTHY = 4;
  }
}

message PlayerUpdate {
  string server_id                       = 1;
  int32  player_count                    = 2;
  repeated string player_names           = 3;
  google.protobuf.Timestamp recorded_at  = 4;
}

message RsyncReadyUpdate {
  // Echoed from PrepareRsyncReceiveCommand.
  string migration_id   = 1;
  // One-time password generated by the destination agent for this transfer.
  // Master passes this through to the source agent in StartRsyncCommand.
  string rsync_password = 2;
}

message RsyncProgressUpdate {
  string migration_id      = 1;
  bool   is_final_pass     = 2;
  int64  bytes_transferred = 3;
  int64  total_bytes       = 4;
  int32  percent_complete  = 5;
  // Current rsync phase, e.g. "sending incremental file list", "sending file".
  string phase             = 6;
  google.protobuf.Timestamp recorded_at = 7;
}

message RsyncCompleteUpdate {
  string migration_id      = 1;
  bool   is_final_pass     = 2;
  bool   success           = 3;
  int64  bytes_transferred = 4;
  // Present on failure.
  string error_message     = 5;
  google.protobuf.Timestamp completed_at = 6;
}

message BackupProgressUpdate {
  string backup_id = 1;
  string server_id = 2;
  // -1 if the underlying tool does not report progress.
  int32  percent_complete = 3;
}

message BackupCompleteUpdate {
  string backup_id     = 1;
  string server_id     = 2;
  bool   success       = 3;
  string file_path     = 4;
  int64  size_bytes    = 5;
  string error_message = 6;
  google.protobuf.Timestamp completed_at = 7;
}

message ShutdownAcknowledgeUpdate {
  // Containers stopped cleanly via stdin stop command.
  int32 graceful_count = 1;
  // Containers that did not respond and were force-stopped via Docker stop.
  int32 forced_count   = 2;
}

// ─────────────────────────────────────────────────────────────────────────────
// DATA SERVICE — CONSOLE
// ─────────────────────────────────────────────────────────────────────────────

message ConsoleInput {
  string server_id = 1;
  // Raw bytes from the browser terminal written to container stdin via Docker attach.
  bytes  data      = 2;
}

message ConsoleOutput {
  string server_id = 1;
  // Raw bytes from container stdout/stderr via Docker attach.
  bytes  data      = 2;
}

// ─────────────────────────────────────────────────────────────────────────────
// DATA SERVICE — FILE OPERATIONS
// ─────────────────────────────────────────────────────────────────────────────

message ListFilesRequest {
  string server_id = 1;
  // Path relative to the server's data directory.
  string path      = 2;
}

message ListFilesResponse {
  repeated FileEntry entries = 1;
}

message FileEntry {
  string name         = 1;
  bool   is_directory = 2;
  int64  size_bytes   = 3;
  google.protobuf.Timestamp modified_at = 4;
  // Unix permission string, e.g. "rw-r--r--".
  string permissions  = 5;
}

message ReadFileRequest {
  string server_id = 1;
  string path      = 2;
}

message ReadFileResponse {
  bytes  content  = 1;
  // "utf-8" or "binary" — master uses this to decide how to present the file.
  string encoding = 2;
}

message WriteFileRequest {
  string server_id = 1;
  string path      = 2;
  bytes  content   = 3;
}

message WriteFileResponse {
  bool success = 1;
}

message DeleteFileRequest {
  string server_id = 1;
  string path      = 2;
  // If true, delete directory and all contents recursively.
  bool   recursive = 3;
}

message DeleteFileResponse {
  bool success = 1;
}

message MakeDirectoryRequest {
  string server_id = 1;
  string path      = 2;
}

message MakeDirectoryResponse {
  bool success = 1;
}

message MoveFileRequest {
  string server_id = 1;
  // Source path relative to the server's data directory.
  string source_path      = 2;
  // Destination path relative to the server's data directory.
  // Moving across directories and renaming within a directory both use this RPC.
  string destination_path = 3;
}

message MoveFileResponse {
  bool success = 1;
}

message CopyFileRequest {
  string server_id        = 1;
  string source_path      = 2;
  string destination_path = 3;
  // If true and destination is an existing directory, copy recursively into it.
  bool   recursive        = 4;
}

message CopyFileResponse {
  bool success = 1;
}

// ─────────────────────────────────────────────────────────────────────────────
// DATA SERVICE — FILE TRANSFER
// ─────────────────────────────────────────────────────────────────────────────

message UploadFileChunk {
  // Only required on the first message in the stream.
  string server_id = 1;
  string path      = 2;
  bytes  data      = 3;
  // Set true on the final chunk.
  bool   is_last   = 4;
}

message UploadFileResponse {
  bool  success    = 1;
  int64 size_bytes = 2;
}

message DownloadFileRequest {
  string server_id = 1;
  string path      = 2;
}

message DownloadFileChunk {
  bytes data    = 1;
  // Set true on the final chunk.
  bool  is_last = 2;
}
