ktor {
  deployment {
    port = 8080
    port = ${?HTTP_PORT}
  }
  application {
    modules = [io.craftpanel.master.MainKt.module]
  }
}

database {
  url = "jdbc:postgresql://localhost:5432/craftpanel"
  url = ${?DATABASE_URL}
  username = "craftpanel"
  username = ${?DATABASE_USERNAME}
  password = ""
  password = ${?DATABASE_PASSWORD}
  maximumPoolSize = 10
  maximumPoolSize = ${?DATABASE_POOL_SIZE}
}

jwt {
  secret = "changeme-at-least-32-characters-long"
  secret = ${?JWT_SECRET}
  issuer = "craftpanel"
  audience = "craftpanel-ui"
  expirySeconds = 900
}

grpc {
  port = 50051
  port = ${?GRPC_PORT}
  tlsCertPath = ""
  tlsCertPath = ${?GRPC_TLS_CERT}
  tlsKeyPath = ""
  tlsKeyPath = ${?GRPC_TLS_KEY}
}

node {
  bootstrapToken = "changeme"
  bootstrapToken = ${?NODE_BOOTSTRAP_TOKEN}
  agentDataPort = 50052
  agentDataPort = ${?AGENT_DATA_PORT}
}

dns {
  provider = "none"
  provider = ${?DNS_PROVIDER}
  cloudflare {
    apiToken = ""
    apiToken = ${?CF_API_TOKEN}
  }
}
