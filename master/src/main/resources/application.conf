ktor {
  deployment {
    port = 8080
    port = ${?HTTP_PORT}
  }
  application {
    modules = [io.craftpanel.master.MainKt.module]
  }
}

app {
  profile = "prod"
  profile = ${?CRAFTPANEL_PROFILE}
}

database {
  url = "jdbc:postgresql://localhost:5432/craftpanel"
  url = ${?DATABASE_URL}
  username = "craftpanel"
  username = ${?DATABASE_USERNAME}
  password = ""
  password = ${?DATABASE_PASSWORD}
  maximumPoolSize = 10
  maximumPoolSize = ${?DATABASE_POOL_SIZE}
}

jwt {
  secret = "changeme-at-least-32-characters-long"
  secret = ${?JWT_SECRET}
  issuer = "craftpanel"
  audience = "craftpanel-ui"
  expirySeconds = 900
}

grpc {
  port = 50051
  port = ${?GRPC_PORT}
  # Explicit cert paths — takes priority over auto-gen when both are set.
  tlsCertPath = ""
  tlsCertPath = ${?GRPC_TLS_CERT}
  tlsKeyPath = ""
  tlsKeyPath = ${?GRPC_TLS_KEY}
  # Directory for auto-generated CA + server certs. Needs a persistent volume in prod.
  certStorePath = "/app/certs"
  certStorePath = ${?GRPC_CERT_STORE_PATH}
  # Comma-separated additional SANs to include in auto-generated server cert.
  tlsSans = ""
  tlsSans = ${?GRPC_TLS_SANS}
}

node {
  bootstrapToken = "changeme"
  bootstrapToken = ${?NODE_BOOTSTRAP_TOKEN}
  agentDataPort = 50052
  agentDataPort = ${?AGENT_DATA_PORT}
  agentTlsTrustCertPath = ""
  agentTlsTrustCertPath = ${?NODE_AGENT_TLS_TRUST_CERT}
}

dns {
  provider = "none"
  provider = ${?DNS_PROVIDER}
  cloudflare {
    apiToken = ""
    apiToken = ${?CF_API_TOKEN}
  }
}

cors {
  allowedHosts = ""
  allowedHosts = ${?CORS_ALLOWED_HOSTS}
  allowedSchemes = "https"
  allowedSchemes = ${?CORS_ALLOWED_SCHEMES}
}

rateLimit {
  loginPerMinute = 10
  loginPerMinute = ${?RATE_LIMIT_LOGIN}
  refreshPerMinute = 30
  refreshPerMinute = ${?RATE_LIMIT_REFRESH}
}

adminSeed {
  email = ""
  email = ${?CRAFTPANEL_ADMIN_EMAIL}
  password = ""
  password = ${?CRAFTPANEL_ADMIN_PASSWORD}
  username = "admin"
  username = ${?CRAFTPANEL_ADMIN_USERNAME}
}

images {
  minecraftImage = "itzg/minecraft-server"
  minecraftImage = ${?CRAFTPANEL_IMAGE_OVERRIDE_MINECRAFT}
  proxyImage = "itzg/mc-proxy"
  proxyImage = ${?CRAFTPANEL_IMAGE_OVERRIDE_PROXY}
}
