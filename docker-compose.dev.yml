services:
  traefik:
    image: traefik:v3
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: craftpanel
      POSTGRES_USER: craftpanel
      POSTGRES_PASSWORD: craftpanel
    volumes:
      - db-data:/var/lib/postgresql/data

  master:
    # Build: ./gradlew :master:dockerBuildImage
    image: ghcr.io/nelsongraca/craftpanel/master:latest
    ports:
      - "50051:50051"
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/craftpanel
      DATABASE_USERNAME: craftpanel
      DATABASE_PASSWORD: craftpanel
      JWT_SECRET: dev-secret-change-me-in-production
      NODE_BOOTSTRAP_TOKEN: devtoken
      CRAFTPANEL_PROFILE: dev
    depends_on:
      - db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.master-api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.master-api.entrypoints=web"
      - "traefik.http.routers.master-api.priority=10"
      - "traefik.http.services.master.loadbalancer.server.port=8080"

  frontend:
    # Build: ./gradlew :frontend:dockerBuildImage
    image: ghcr.io/nelsongraca/craftpanel/frontend:latest
    depends_on:
      master:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

  seed:
    image: postgres:17-alpine
    depends_on:
      master:
        condition: service_healthy
    volumes:
      - ./dev/seed.sql:/seed.sql:ro
    environment:
      PGPASSWORD: craftpanel
    entrypoint: ["psql", "-h", "db", "-U", "craftpanel", "-d", "craftpanel", "-f", "/seed.sql"]
    restart: "no"

volumes:
  db-data:
