services:
  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: craftpanel
      POSTGRES_USER: craftpanel
      POSTGRES_PASSWORD: craftpanel

  seed:
    image: postgres:17-alpine
    depends_on:
      - db
    volumes:
      - ./dev/seed.sql:/seed.sql:ro
    environment:
      PGPASSWORD: craftpanel
    # Waits for master's /health endpoint (which confirms schema is ready), then loads seed data.
    entrypoint: >
      sh -c "
        until wget -qO- http://host.docker.internal:8080/health; do sleep 2; done &&
        psql -h db -U craftpanel -d craftpanel -f /seed.sql
      "
    restart: "no"
    extra_hosts:
      - "host.docker.internal:host-gateway"
