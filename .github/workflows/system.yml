name: System Tests

on:
  push:
    branches:
      - master
      - develop

jobs:
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: ./.github/actions/setup-gradle

      - name: Restore Gradle build cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.gradle/caches/build-cache-1
          key: gradle-build-cache-${{ github.sha }}
          restore-keys: gradle-build-cache-

      - name: Restore Docker layer cache
        uses: actions/cache/restore@v4
        with:
          path: /var/lib/docker
          key: docker-layers-${{ runner.os }}-${{ hashFiles('master/Dockerfile', 'agent/Dockerfile', 'fake-server/Dockerfile') }}-${{ github.sha }}
          restore-keys: |
            docker-layers-${{ runner.os }}-${{ hashFiles('master/Dockerfile', 'agent/Dockerfile', 'fake-server/Dockerfile') }}-
            docker-layers-shared-${{ runner.os }}-${{ hashFiles('master/Dockerfile', 'agent/Dockerfile') }}-

      - name: Build Docker images
        run: ./gradlew :master:dockerBuildImage :agent:dockerBuildImage :fake-server:dockerBuildImage

      - name: Make Docker data root readable for cache save
        # /var/lib/docker is root-owned; actions/cache runs as the unprivileged
        # runner user and can't scandir it, so every save fails silently with
        # EACCES ("Cache save failed" warning, cache key never populated).
        run: sudo chmod -R a+rX /var/lib/docker

      - name: Save Docker layer cache
        uses: actions/cache/save@v4
        with:
          path: /var/lib/docker
          key: docker-layers-${{ runner.os }}-${{ hashFiles('master/Dockerfile', 'agent/Dockerfile', 'fake-server/Dockerfile') }}-${{ github.sha }}

      - name: Save shared (master+agent) Docker layer cache
        uses: actions/cache/save@v4
        with:
          path: /var/lib/docker
          key: docker-layers-shared-${{ runner.os }}-${{ hashFiles('master/Dockerfile', 'agent/Dockerfile') }}-${{ github.sha }}

      - name: Warm up system-tests compile cache
        run: ./gradlew :system-tests:compileTestKotlin

      - name: Save Gradle build cache
        uses: actions/cache/save@v4
        with:
          path: ~/.gradle/caches/build-cache-1
          key: gradle-build-cache-${{ github.sha }}

      - name: Save Docker images
        run: |
          docker save \
            ghcr.io/nelsongraca/craftpanel/master:latest \
            ghcr.io/nelsongraca/craftpanel/agent:latest \
            craftpanel-fake-server:latest \
            craftpanel-fake-proxy:latest \
            -o /tmp/craftpanel-images.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: craftpanel-docker-images
          path: /tmp/craftpanel-images.tar
          retention-days: 1

  system-tests:
    name: System Tests (${{ matrix.tag }})
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        tag: [ServerCore, ServerOps, Node, Auth, BackupAlerts, Misc]
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-gradle

      - name: Restore Gradle build cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.gradle/caches/build-cache-1
          key: gradle-build-cache-${{ github.sha }}
          restore-keys: gradle-build-cache-

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: craftpanel-docker-images
          path: /tmp

      - name: Load Docker images
        run: docker load -i /tmp/craftpanel-images.tar

      - name: Run system tests
        run: ./gradlew :system-tests:test -PwithCoverage -PskipDockerBuild -PkotestTags=${{ matrix.tag }} --configuration-cache-problems=warn

      - name: Upload test reports
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: system-test-reports-${{ matrix.tag }}
          path: system-tests/build/reports/tests/test/
          retention-days: 3

      - uses: ./.github/actions/codecov-upload
        with:
          flags: system
          test-results: system-tests/build/test-results/**/*.xml
          coverage-files: system-tests/build/reports/kover/system-tests/report.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e-tests:
    name: E2E Tests (MSW)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-gradle

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: frontend/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install Playwright browsers
        run: ./gradlew :frontend:installFrontend && cd frontend && .node/bin/pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: ./gradlew :frontend:testE2eMocked --configuration-cache-problems=warn

      - uses: ./.github/actions/codecov-upload
        with:
          flags: e2e
          test-results: frontend/build/reports/junit/playwright.xml
          token: ${{ secrets.CODECOV_TOKEN }}
