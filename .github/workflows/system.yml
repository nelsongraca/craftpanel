name: System Tests

on:
  push:
    branches:
      - master

jobs:
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Cache local .gradle
        uses: actions/cache@v4
        with:
          path: .gradle/
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Restore Gradle build cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.gradle/caches/build-cache-1
          key: gradle-build-cache-${{ github.sha }}
          restore-keys: gradle-build-cache-

      - name: Build Docker images
        run: ./gradlew :master:dockerBuildImage :agent:dockerBuildImage :fake-server:dockerBuildImage

      - name: Warm up system-tests compile cache
        run: ./gradlew :system-tests:compileTestKotlin

      - name: Save Gradle build cache
        uses: actions/cache/save@v4
        with:
          path: ~/.gradle/caches/build-cache-1
          key: gradle-build-cache-${{ github.sha }}

      - name: Save Docker images
        run: |
          docker save \
            ghcr.io/nelsongraca/craftpanel/master:latest \
            ghcr.io/nelsongraca/craftpanel/agent:latest \
            craftpanel-fake-server:latest \
            craftpanel-fake-proxy:latest \
            -o /tmp/craftpanel-images.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: craftpanel-docker-images
          path: /tmp/craftpanel-images.tar
          retention-days: 1

  system-tests:
    name: System Tests (${{ matrix.tag }})
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        tag: [ServerCore, ServerOps, Node, Auth, BackupAlerts, Misc]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Cache local .gradle
        uses: actions/cache@v4
        with:
          path: .gradle/
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Restore Gradle build cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.gradle/caches/build-cache-1
          key: gradle-build-cache-${{ github.sha }}
          restore-keys: gradle-build-cache-

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: craftpanel-docker-images
          path: /tmp

      - name: Load Docker images
        run: docker load -i /tmp/craftpanel-images.tar

      - name: Run system tests
        run: ./gradlew :system-tests:test -PwithCoverage -PskipDockerBuild -PkotestTags=${{ matrix.tag }} --configuration-cache-problems=warn

      - name: Upload test reports
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: system-test-reports-${{ matrix.tag }}
          path: system-tests/build/reports/tests/test/
          retention-days: 3

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: system-tests/build/test-results/**/*.xml
          flags: system

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: system-tests/build/reports/kover/system-tests/report.xml
          flags: system
          fail_ci_if_error: true

  e2e-tests:
    name: E2E Tests (MSW)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Cache local .gradle
        uses: actions/cache@v4
        with:
          path: .gradle/
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: frontend/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install Playwright browsers
        run: ./gradlew :frontend:installFrontend && cd frontend && .node/bin/pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: ./gradlew :frontend:testE2eMocked --configuration-cache-problems=warn

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/build/reports/junit/playwright.xml
          flags: e2e
