name: Publish Images

on:
  workflow_run:
    workflows: ["System Tests"]
    types: [completed]
    branches: [master]
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

concurrency:
  group: publish-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  publish-dev:
    name: Build & Push (master → dev tag)
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          fetch-tags: true

      - uses: ./.github/actions/verify-workflow-success
        with:
          workflow: ci.yml
          sha: ${{ github.event.workflow_run.head_sha }}
          branch: master
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/verify-workflow-success
        with:
          workflow: system.yml
          sha: ${{ github.event.workflow_run.head_sha }}
          branch: master
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-gradle

      - name: Restore Docker layer cache
        uses: actions/cache/restore@v4
        with:
          path: /var/lib/docker
          key: docker-layers-${{ runner.os }}-${{ hashFiles('master/Dockerfile', 'agent/Dockerfile', 'frontend/Dockerfile') }}-${{ github.event.workflow_run.head_sha }}
          restore-keys: |
            docker-layers-${{ runner.os }}-${{ hashFiles('master/Dockerfile', 'agent/Dockerfile', 'frontend/Dockerfile') }}-
            docker-layers-shared-${{ runner.os }}-${{ hashFiles('master/Dockerfile', 'agent/Dockerfile') }}-${{ github.event.workflow_run.head_sha }}
            docker-layers-shared-${{ runner.os }}-${{ hashFiles('master/Dockerfile', 'agent/Dockerfile') }}-

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push images (dev)
        run: ./gradlew dockerBuildAll dockerPushAll -PimageVersion=dev

      - name: Make Docker data root readable for cache save
        # /var/lib/docker is root-owned; actions/cache runs as the unprivileged
        # runner user and can't scandir it, so every save fails silently with
        # EACCES ("Cache save failed" warning, cache key never populated).
        run: sudo chmod -R a+rX /var/lib/docker

      - name: Save Docker layer cache
        uses: actions/cache/save@v4
        with:
          path: /var/lib/docker
          key: docker-layers-${{ runner.os }}-${{ hashFiles('master/Dockerfile', 'agent/Dockerfile', 'frontend/Dockerfile') }}-${{ github.event.workflow_run.head_sha }}

  publish-release:
    name: Build & Push (tag → version + latest)
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: ./.github/actions/verify-workflow-success
        with:
          workflow: ci.yml
          sha: ${{ github.sha }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/verify-workflow-success
        with:
          workflow: system.yml
          sha: ${{ github.sha }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-gradle

      - name: Restore Docker layer cache
        uses: actions/cache/restore@v4
        with:
          path: /var/lib/docker
          key: docker-layers-${{ runner.os }}-${{ hashFiles('master/Dockerfile', 'agent/Dockerfile', 'frontend/Dockerfile') }}-${{ github.sha }}
          restore-keys: |
            docker-layers-${{ runner.os }}-${{ hashFiles('master/Dockerfile', 'agent/Dockerfile', 'frontend/Dockerfile') }}-
            docker-layers-shared-${{ runner.os }}-${{ hashFiles('master/Dockerfile', 'agent/Dockerfile') }}-${{ github.sha }}
            docker-layers-shared-${{ runner.os }}-${{ hashFiles('master/Dockerfile', 'agent/Dockerfile') }}-

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push images (version)
        run: ./gradlew dockerBuildAll dockerPushAll -PimageVersion=${{ github.ref_name }}

      - name: Build & push images (latest)
        run: ./gradlew dockerBuildAll dockerPushAll -PimageVersion=latest

      - name: Make Docker data root readable for cache save
        # /var/lib/docker is root-owned; actions/cache runs as the unprivileged
        # runner user and can't scandir it, so every save fails silently with
        # EACCES ("Cache save failed" warning, cache key never populated).
        run: sudo chmod -R a+rX /var/lib/docker

      - name: Save Docker layer cache
        uses: actions/cache/save@v4
        with:
          path: /var/lib/docker
          key: docker-layers-${{ runner.os }}-${{ hashFiles('master/Dockerfile', 'agent/Dockerfile', 'frontend/Dockerfile') }}-${{ github.sha }}

  cleanup:
    name: Delete untagged image versions
    needs: [publish-dev, publish-release]
    if: always() && (needs.publish-dev.result == 'success' || needs.publish-release.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        image: [master, agent, frontend]
    steps:
      - name: Delete untagged image versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: craftpanel/${{ matrix.image }}
          package-type: container
          min-versions-to-keep: 0
          delete-only-untagged-versions: true
