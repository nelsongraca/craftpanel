name: Publish Images

on:
  workflow_run:
    workflows: ["System Tests"]
    types: [completed]
    branches: [master]
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

concurrency:
  group: publish-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  publish-dev:
    name: Build & Push (master → dev tag)
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: ./.github/actions/verify-workflow-success
        with:
          workflow: ci.yml
          sha: ${{ github.event.workflow_run.head_sha }}
          branch: master
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/verify-workflow-success
        with:
          workflow: system.yml
          sha: ${{ github.event.workflow_run.head_sha }}
          branch: master
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-gradle

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push images (dev)
        run: ./gradlew dockerBuildAll dockerPushAll -PimageVersion=dev

  publish-release:
    name: Build & Push (tag → version + latest)
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/verify-workflow-success
        with:
          workflow: ci.yml
          sha: ${{ github.sha }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/verify-workflow-success
        with:
          workflow: system.yml
          sha: ${{ github.sha }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-gradle

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push images (version)
        run: ./gradlew dockerBuildAll dockerPushAll -PimageVersion=${{ github.ref_name }}

      - name: Build & push images (latest)
        run: ./gradlew dockerBuildAll dockerPushAll -PimageVersion=latest
