name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Cache local .gradle
        uses: actions/cache@v4
        with:
          path: .gradle/
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install pv
        run: sudo apt-get install -y pv

      - name: Run backend unit tests
        run: ./gradlew :master:test :agent:test -PwithCoverage

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: master/build/test-results/**/*.xml,agent/build/test-results/**/*.xml
          flags: backend

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: master/build/reports/kover/report.xml,agent/build/reports/kover/report.xml
          flags: backend
          fail_ci_if_error: true

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Cache local .gradle
        uses: actions/cache@v4
        with:
          path: .gradle/
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: frontend/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Run frontend tests
        run: ./gradlew :frontend:testFrontend -PwithCoverage

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/build/reports/junit/vitest.xml
          flags: frontend

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/build/reports/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: true
