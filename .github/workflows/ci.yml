name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - develop

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-gradle

      - name: Install pv
        run: sudo apt-get install -y pv

      - name: Run backend unit tests
        run: ./gradlew :master:test :agent:test -PwithCoverage

      - uses: ./.github/actions/codecov-upload
        with:
          flags: backend
          test-results: master/build/test-results/**/*.xml,agent/build/test-results/**/*.xml
          coverage-files: master/build/reports/kover/report.xml,agent/build/reports/kover/report.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-gradle

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: frontend/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Run frontend lint and typecheck
        run: ./gradlew :frontend:checkFrontend :frontend:typecheckFrontend

      - name: Run frontend tests
        run: ./gradlew :frontend:testFrontend -PwithCoverage

      - uses: ./.github/actions/codecov-upload
        with:
          flags: frontend
          test-results: frontend/build/reports/junit/vitest.xml
          coverage-files: frontend/build/reports/coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
