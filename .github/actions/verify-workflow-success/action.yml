name: Verify Workflow Success
description: Fails the job unless the given workflow's latest run for a commit succeeded

inputs:
  workflow:
    description: Workflow file name (e.g. ci.yml)
    required: true
  sha:
    description: Commit SHA to check
    required: true
  branch:
    description: Branch to filter the run by (optional)
    required: false
    default: ""
  github-token:
    description: Token with actions:read used to query run status
    required: true
  timeout-seconds:
    description: Max time to poll for the workflow run to complete
    required: false
    default: "1200"

runs:
  using: composite
  steps:
    - name: Verify ${{ inputs.workflow }} succeeded for this commit
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        WORKFLOW: ${{ inputs.workflow }}
        SHA: ${{ inputs.sha }}
        BRANCH: ${{ inputs.branch }}
        TIMEOUT_SECONDS: ${{ inputs.timeout-seconds }}
      run: |
        args=(--repo "$GITHUB_REPOSITORY" --workflow="$WORKFLOW" --commit="$SHA" --json status,conclusion --jq '.[0]')
        if [ -n "$BRANCH" ]; then
          args+=(--branch="$BRANCH")
        fi

        deadline=$(( $(date +%s) + TIMEOUT_SECONDS ))
        while true; do
          run_json=$(gh run list "${args[@]}")
          status=$(jq -r '.status // "missing"' <<< "$run_json")
          conclusion=$(jq -r '.conclusion // "null"' <<< "$run_json")

          if [ "$status" == "completed" ]; then
            break
          fi

          if [ "$(date +%s)" -ge "$deadline" ]; then
            echo "Timed out waiting for $WORKFLOW to complete for $SHA (last status: $status)"
            exit 1
          fi

          echo "$WORKFLOW for $SHA is still $status, waiting..."
          sleep 15
        done

        if [ "$conclusion" != "success" ]; then
          echo "$WORKFLOW has not succeeded for $SHA (conclusion: $conclusion)"
          exit 1
        fi
